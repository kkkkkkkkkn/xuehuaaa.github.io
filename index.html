<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>润泽的个人博客</title>
    <!-- 外部 CSS 文件 -->
    <link rel="stylesheet" href="style.css">
    <!-- marked.js CDN - 用于解析 Markdown 内容为 HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <!-- 全屏背景图容器 -->
    <div class="background-container">
        <!-- 
            背景图路径配置：
            1. 将你的背景图片命名为 background.jpg，放在 images/ 文件夹下
            2. 背景图样式在 style.css 第 42-65 行配置
            3. 如需使用在线图片，编辑 style.css 取消备用背景图的注释
        -->
        <div class="background-image"></div>
        <!-- 背景图上的半透明遮罩，让文字更清晰 -->
        <div class="overlay"></div>
    </div>

    <!-- 左上角博客标题 -->
    <header class="site-header">
        润泽的个人博客
    </header>

    <!-- 右上角分类导航区域 -->
    <nav class="category-nav" id="categoryNav">
        <!-- 
            分类导航将通过 JavaScript 动态生成
            数据来源：notes-index.json 中的 categories 数组
            每个分类会生成一个可点击的按钮
        -->
        <button class="nav-btn active" data-category="all">首页</button>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">
        <!-- 个人介绍区域（首页默认显示） -->
        <section class="intro-section" id="introSection">
            <div class="intro-card">
                <h1 class="intro-title">欢迎来到我的博客</h1>
                <p class="intro-text">
                    谁说雪花不是花
                </p>
            </div>
        </section>

        <!-- 笔记列表区域（点击分类后显示） -->
        <section class="notes-list-section" id="notesListSection" style="display: none;">
            <div class="notes-list-card">
                <h2 class="section-title" id="categoryTitle">分类名称</h2>
                <ul class="notes-list" id="notesList">
                    <!-- 笔记列表将通过 JavaScript 动态生成 -->
                </ul>
                <!-- 返回按钮 -->
                <button class="back-btn" id="backBtn">← 返回首页</button>
            </div>
        </section>

        <!-- 笔记内容区域（点击笔记标题后显示） -->
        <section class="note-content-section" id="noteContentSection" style="display: none;">
            <div class="note-content-card">
                <button class="back-btn" id="backToListBtn">← 返回列表</button>
                <h1 class="note-title" id="noteTitle">笔记标题</h1>
                <hr class="divider">
                <!-- Markdown 渲染后的内容会插入到这里 -->
                <div class="note-body" id="noteBody">
                    <!-- marked.js 解析后的 HTML 内容 -->
                </div>
            </div>
        </section>
    </main>

    <!-- 外部 JavaScript 文件 -->
    <script src="script.js"></script>
</body>
</html>
